<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregar Mascota</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .navbar-custom {
            background-color: #343a40;
        }
        .form-section {
            background-color: #f8f9fa;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            margin-top: 20px;
        }
    </style>
</head>
<body class="bg-light">
    <!-- Barra de navegación -->
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container">
            <a class="navbar-brand text-white" href="/">HelPet</a>
        </div>
    </nav>

    <!-- Formulario de agregar mascota -->
    <div class="container">
        <h2>Agregar Mascota para {{ dueño.nombre }} {{ dueño.apellidos }}</h2>
        <form method="POST" action="{% url 'agregar_mascota' dueño.id_dueño %}">
            {% csrf_token %}
            <label for="nombre">Nombre:</label>
            <input type="text" name="nombre" id="nombre" required>
            
            <label for="raza">Raza:</label>
            <input type="text" name="raza" id="raza" required>
            
            <label for="especie">Especie:</label>
            <input type="text" name="especie" id="especie" required>
            
            <label for="sexo">Sexo:</label>
            <select name="sexo" id="sexo" required>
                <option value="Macho">Macho</option>
                <option value="Hembra">Hembra</option>
            </select>
            
            <label for="nacimiento">Nacimiento:</label>
            <input type="date" name="nacimiento" id="nacimiento" required>
            
            <button type="submit" class="btn btn-primary">Guardar Mascota</button>
        </form>
    </div>

    <script>
        function limpiarFormulario() {
            document.getElementById("nombre").value = "";
            document.getElementById("raza").value = "";
            document.getElementById("especie").value = "";
            document.getElementById("sexo").value = "";
            document.getElementById("nacimiento").value = "";
        }
    </script>
</body>
</html>
