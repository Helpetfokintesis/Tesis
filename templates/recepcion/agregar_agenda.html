<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregar Cita - Agenda</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .navbar-custom {
            background-color: #343a40;
        }
        .form-section {
            background-color: #f8f9fa;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            margin-top: 20px;
        }
    </style>
</head>
<body class="bg-light">
    <!-- Barra de navegación -->
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container">
            <a class="navbar-brand text-white" href="/">HelPet</a>
        </div>
    </nav>

    <!-- Formulario de agregar cita -->
    <div class="container">
        <form method="POST" action="{% url 'agregar_agenda' %}">
            {% csrf_token %}
            <div class="form-section">
                <h3 class="text-center">Registrar Cita</h3>
                <div class="mb-3">
                    <label for="fecha" class="form-label">Fecha</label>
                    <input type="date" class="form-control" id="fecha" name="fecha" required>
                </div>
                <div class="mb-3">
                    <label for="hora" class="form-label">Hora</label>
                    <input type="time" class="form-control" id="hora" name="hora" required>
                </div>
                <div class="mb-3">
                    <label for="estado" class="form-label">Estado</label>
                    <input type="text" class="form-control" id="estado" name="estado" maxlength="50" placeholder="Ej. Pendiente, Completada" required>
                </div>
                <div class="mb-3">
                    <label for="mascota" class="form-label">Mascota</label>
                    <select class="form-select" id="mascota" name="mascota" required>
                        <option value="" disabled selected>Selecciona una mascota</option>
                        {% for mascota in mascotas %}
                        <option value="{{ mascota.id }}">{{ mascota.nombre }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="mb-3">
                    <label for="usuario" class="form-label">Usuario</label>
                    <select class="form-select" id="usuario" name="usuario" required>
                        <option value="" disabled selected>Selecciona un usuario</option>
                        {% for usuario in usuarios %}
                        <option value="{{ usuario.id }}">{{ usuario.nombre }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="text-center mt-4">
                    <button type="submit" class="btn btn-primary">Guardar Cita</button>
                    <button type="button" class="btn btn-secondary" onclick="limpiarFormulario()">Limpiar</button>
                    <button type="button" class="btn btn-danger" onclick="window.history.back()">Volver</button>
                </div>
            </div>
        </form>
    </div>

    <script>
        function limpiarFormulario() {
            document.getElementById("fecha").value = "";
            document.getElementById("hora").value = "";
            document.getElementById("estado").value = "";
            document.getElementById("mascota").value = "";
            document.getElementById("usuario").value = "";
        }
    </script>
</body>
</html>
