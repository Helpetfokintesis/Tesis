<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregar Consulta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .navbar-custom {
            background-color: #343a40;
        }
        .form-section {
            background-color: #f8f9fa;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            margin-top: 20px;
        }
    </style>
</head>
<body class="bg-light">
    <!-- Barra de navegación -->
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container">
            <a class="navbar-brand text-white" href="/">HelPet</a>
        </div>
    </nav>

    <!-- Formulario de agregar consulta -->
    <div class="container">
        <form method="POST" action="{% url 'agregar_consulta' %}">
            {% csrf_token %}
            <div class="form-section">
                <h3 class="text-center">Registrar Consulta</h3>
                <div class="mb-3">
                    <label for="mascota" class="form-label">Mascota</label>
                    <select class="form-select" id="mascota" name="mascota" required>
                        <option value="" disabled selected>Selecciona una mascota</option>
                        {% for mascota in mascotas %}
                        <option value="{{ mascota.id }}">{{ mascota.nombre }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="mb-3">
                    <label for="fecha_consulta" class="form-label">Fecha de la Consulta</label>
                    <input type="date" class="form-control" id="fecha_consulta" name="fecha_consulta" required>
                </div>
                <div class="mb-3">
                    <label for="motivo" class="form-label">Motivo</label>
                    <textarea class="form-control" id="motivo" name="motivo" rows="3" placeholder="Describe el motivo de la consulta" required></textarea>
                </div>
                <div class="mb-3">
                    <label for="diagnostico" class="form-label">Diagnóstico</label>
                    <textarea class="form-control" id="diagnostico" name="diagnostico" rows="3" placeholder="Ingresa el diagnóstico" required></textarea>
                </div>
                <div class="mb-3">
                    <label for="tratamiento" class="form-label">Tratamiento</label>
                    <textarea class="form-control" id="tratamiento" name="tratamiento" rows="3" placeholder="Describe el tratamiento" required></textarea>
                </div>
                <div class="mb-3">
                    <label for="productos" class="form-label">Productos Relacionados</label>
                    <select class="form-select" id="productos" name="productos" multiple>
                        {% for producto in productos %}
                        <option value="{{ producto.id_producto }}">{{ producto.nombre_producto }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="text-center mt-4">
                    <button type="submit" class="btn btn-primary">Guardar Consulta</button>
                    <button type="button" class="btn btn-secondary" onclick="limpiarFormulario()">Limpiar</button>
                    <button type="button" class="btn btn-danger" onclick="window.history.back()">Volver</button>
                </div>
            </div>
        </form>
    </div>

    <script>
        function limpiarFormulario() {
            document.getElementById("mascota").value = "";
            document.getElementById("fecha_consulta").value = "";
            document.getElementById("motivo").value = "";
            document.getElementById("diagnostico").value = "";
            document.getElementById("tratamiento").value = "";
            const productosSelect = document.getElementById("productos");
            for (let i = 0; i < productosSelect.options.length; i++) {
                productosSelect.options[i].selected = false;
            }
        }
    </script>
</body>
</html>
